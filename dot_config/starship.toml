# --- Paleta Solarized (Base) ---
[palettes.solarized]
# Tons de Cinza/Azul para Texto
base03  = "#002b36"
base02  = "#073642"
base01  = "#586e75" # Texto Principal
base00  = "#657b83" # Texto Secund├írio
# Tons de Fundo Claro
base0   = "#839496"
base1   = "#93a1a1"
base2   = "#eee8d5" # Destaque Claro 1
base3   = "#fdf6e3" # Fundo Principal (Papel)
# Cores de destaque
yellow  = "#b58900"
orange  = "#cb4b16"
red     = "#dc322f"
magenta = "#d33682"
violet  = "#6c71c4"
blue    = "#268bd2"
cyan    = "#2aa198"
green   = "#859900"
# Cor extra para fundo de linguagens (levemente mais escuro que a base)
grey_bg = "#d6d6d6"

palette = "solarized"

# --- M├│dulos Ajustados para Light Theme ---

[username]
show_always = true
# Fundo bege (base2), Texto cinza escuro (base01)
style_user = "bg:#eee8d5 fg:#586e75"
style_root = "bg:#eee8d5 fg:#dc322f"
format = '[$user ]($style)'

[directory]
# Fundo Amarelo, Texto claro (base3) para contraste forte
style = "bg:#b58900 fg:#fdf6e3"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "´£İ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éİ"
# Fundo bege (base2)
style = "bg:#eee8d5"
# Texto verde/ciano escuro
format = '[[ $symbol $branch ](fg:#2aa198 bg:#eee8d5)]($style)'

[git_status]
style = "bg:#eee8d5"
format = '[[($all_status$ahead_behind )](fg:#dc322f bg:#eee8d5)]($style)'

# Linguagens: Fundo cinza claro (#d6d6d6) para diferenciar do fundo bege

