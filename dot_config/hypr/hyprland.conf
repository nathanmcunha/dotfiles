################
### VARIÁVEIS ###
################
source = ~/.config/hypr/colors.conf
$terminal = alacritty
$fileManager = nautilus
$menu = wofi --show drun
$mainMod = SUPER

################
### MONITORES ##
################
monitor=,preferred,auto,auto

#################
### AUTOSTART ###
#################
# Inicia Painel, Notificações, Rede, Bluetooth e Wallpaper
exec-once = hyprpanel
exec-once = hyprpaper
# Inicia o wallpaper rotation
exec-once = ~/.config/hypr/scripts/wallpaper_rotate.sh

# Autenticação (Polkit MATE) - Para pedir senha root
exec-once = /usr/libexec/polkit-mate-authentication-agent-1

# Forçar tema do cursor
exec-once = hyprctl setcursor Adwaita 24
exec-once = copyq --start-server

#############################
### VARIÁVEIS DE AMBIENTE ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#############
### INPUT ###
#############
input {
    # Seu layout US International com AltGr
    kb_layout = us
    kb_variant = altgr-intl
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 1
    gaps_out = 0     # Usei 10 (mais espaço de tela) em vez de 20
    border_size = 1

    # Cores da borda (Estilo Neon/Moderno)
    col.active_border = $primary $secondary 45deg
    col.inactive_border = $background
    resize_on_border = false

    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Sombra (do arquivo gerado - fica bonito)
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # Blur (Fundo embaçado)
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

#################
### ANIMAÇÕES ###
#################
# (Copiado do arquivo gerado: são muito fluidas)
animations {
    enabled = yes
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
}

################
### LAYOUTS ####
################
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

###################
### KEYBINDINGS ###
###################
# --- SISTEMA (Estilo GNOME) ---
bind = $mainMod, C, killactive,          # Fecha Janela (GNOME style)
bind = $mainMod SHIFT, M, exit,          # Logout
bind = $mainMod, V, togglefloating,      # Flutuante
bind = $mainMod, F, fullscreen,          # Tela Cheia
bind = $mainMod, P, pseudo,              # Dwindle pseudo
bind = $mainMod, J, togglesplit,         # Dwindle split
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, W, exec, pkill hyprpanel; hyprpanel & pkill hyprpaper; hyprpaper & hyprctl reload
# --- APPS ---

bind = $mainMod, Q, exec, alacritty
bind = $mainMod, E, exec, $fileManager   # Nautilus
bind = $mainMod, SPACE, exec, $menu      # Wofi (Menu)
bind = $mainMod, B, exec, google-chrome  # Navegador

# --- FOCO COM VIM KEYS (HJKL) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- MOVER JANELAS COM VIM KEYS (SHIFT + HJKL) ---
# Isso permite trocar a janela de lugar segurando Shift
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- WORKSPACES (1-6) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

# --- MOVER JANELA PARA WORKSPACE ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# --- WORKSPACE ESPECIAL (Scratchpad) ---
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# --- MOUSE ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- MULTIMÍDIA E BRILHO (Do arquivo original) ---
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# --- PLAYER DE MÚSICA (Spotify/Browser) ---
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### REGRAS DE JANELAS ###
##############################
# Impede que apps peçam maximização (padrão Hyprland moderno)
windowrule = suppressevent maximize, class:.*

# Correção para drag and drop do XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
