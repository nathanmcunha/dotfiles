################
### VARIÁVEIS ###
################
source = ~/.config/hypr/colors.conf

$terminal = /usr/local/bin/alacritty
$fileManager = nautilus
$menu = /home/nathanmcunha/.cargo/bin/walker
$mainMod = SUPER

################
### MONITORES ##
################
monitor=,preferred,auto,auto

#################
### AUTOSTART ###
#################
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_RUNTIME_DIR DISPLAY
exec-once = /usr/local/bin/hyprpanel-wrapper
exec-once = /usr/local/bin/hyprpaper
exec-once = ~/.config/hypr/scripts/wallpaper_rotate.sh

# Autenticação (Polkit MATE) - Para pedir senha root
# exec-once = /usr/libexec/polkit-mate-authentication-agent-1
exec-once = hyprpolkitagent
exec-once = hypridle

exec-once = /home/nathanmcunha/.local/bin/hyprctl setcursor Adwaita 24
exec-once = copyq --start-server
    exec-once = env LD_LIBRARY_PATH="$HOME/.local/lib64" /home/nathanmcunha/.local/bin/elephant


#############################
### VARIÁVEIS DE AMBIENTE ###
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#############
### INPUT ###
#############
input {
    # Seu layout US International com AltGr
    kb_layout = us
    kb_variant = altgr-intl
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 4
    gaps_out = 4
    border_size = 0

    # Cores da borda (Estilo Neon/Moderno)
    col.active_border = $primary $secondary 45deg
    col.inactive_border = $background
    resize_on_border = true
    extend_border_grab_area = 30

    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 4
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Sombra (do arquivo gerado - fica bonito)
    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # Blur (Fundo embaçado)
    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

#################
### ANIMAÇÕES ###
#################
# (Copiado do arquivo gerado: são muito fluidas)
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 5, myBezier, popin 80%
    animation = windowsOut, 1, 5, myBezier, popin 80%

    animation = layers, 1, 5, myBezier, fade
    animation = layersIn, 1, 5, myBezier, fade
    animation = layersOut, 1, 5, myBezier, fade

    animation = fade, 1, 5, myBezier

    animation = workspaces, 1, 5, myBezier, slide

    animation = specialWorkspaceIn, 1, 5, myBezier, fade
    animation = specialWorkspaceOut, 1, 5, myBezier, fade
}

################
### LAYOUTS ####
################
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    # new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

###################
### KEYBINDINGS ###
bind = $mainMod, RETURN, exec, /usr/local/bin/alacritty

###################
# --- SISTEMA (Estilo GNOME) ---
bind = $mainMod, C, killactive,          # Fecha Janela (GNOME style)
bind = $mainMod SHIFT, M, exit,          # Logout
bind = $mainMod, V, togglefloating,      # Flutuante
bind = $mainMod, F, fullscreen,          # Tela Cheia
bind = $mainMod, P, pseudo,              # Dwindle pseudo
bind = $mainMod, J, layoutmsg, togglesplit,         # Dwindle split
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, W, exec, pkill hyprpanel-wrapper; hyprpanel-wrapper & pkill hyprpaper; hyprpaper & hyprctl reload

# --- APPS ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager   # Nautilus
bind = $mainMod, SPACE, exec, env PATH="$PATH:/home/nathanmcunha/.local/bin" /home/nathanmcunha/.cargo/bin/walker
bind = $mainMod, B, exec, brave-browser # Navegador

# --- SCREENSHOTS ---
bind = , PRINT, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod, PRINT, exec, ~/.config/hypr/scripts/screenshot.sh --edit

# --- FOCO COM VIM KEYS (HJKL) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- MOVER JANELAS COM VIM KEYS (SHIFT + HJKL) ---
# Isso permite trocar a janela de lugar segurando Shift
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- WORKSPACES (1-6) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

# --- MOVER JANELA PARA WORKSPACE ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# --- WORKSPACE ESPECIAL (Scratchpad) ---
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# --- MOUSE ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- MULTIMÍDIA E BRILHO (Do arquivo original) ---
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# --- PLAYER DE MÚSICA (Spotify/Browser) ---
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod SHIFT, I, exec, hyprlock

source = ~/.config/hypr/rules.conf

render {
direct_scanout = false
}
