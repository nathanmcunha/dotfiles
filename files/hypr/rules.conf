##############################
###     WINDOW RULES       ###
##############################
# qs-master: must be floating so hyprctl move/resize dispatchers work
windowrule {
    name        = qs-master-rules
    match:title = ^(qs-master)$
    match:class = ^(qs-master)$
    float       = true
    no_focus    = true
    no_blur     = true
    no_shadow   = true
    border_size = 0
}


###########################
### FLOATING DIALOGS     ###
###########################

# Common dialog titles catch-all
windowrule {
    name        = dialog-titles
    match:title = ^(Open|Save|Save As|Choose|Select|File|Upload|Browse|Confirm|Alert|Error|Warning|Properties|Preferences|Print|Find|About|Permission|Password|Authentication).*
    float       = true
    center      = true
}

# File portal (used by most browsers and GTK apps for file picking)
windowrule {
    name        = file-portal
    match:class = ^(xdg-desktop-portal-gnome|xdg-desktop-portal-gtk)$
    float       = true
    center      = true
}

# Brave popups — matches any Brave window whose title is NOT the main window
windowrule {
    name        = brave-popups
    match:class = ^(Brave-browser|brave-browser)$
    match:title = ^((?!Brave Browser).)*$
    float       = true
    center      = true
}

# System utility dialogs
windowrule {
    name        = system-dialogs
    match:class = ^(pavucontrol|nm-connection-editor|blueman-manager)$
    float       = true
    center      = true
}
# Network and Bluetooth managers — open floating
windowrule {
    name        = nm-connection-editor
    match:class = ^(nm-connection-editor)$
    float       = true
    center      = true
}

windowrule {
    name        = blueman
    match:class = ^(Blueman-manager)$
    float       = true
    center      = true
}
